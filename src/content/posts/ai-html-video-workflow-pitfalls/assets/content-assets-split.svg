<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <style>
      .bg{fill:#fbfbfc}
      .title{font-family:"Microsoft YaHei","Noto Sans SC",sans-serif;font-size:44px;font-weight:800;fill:#111827}
      .sub{font-family:"Microsoft YaHei","Noto Sans SC",sans-serif;font-size:22px;font-weight:600;fill:#5b6472}
      .panel{fill:#fff;stroke:#d9dee7;stroke-width:2}
      .bad{fill:#fff1f0;stroke:#ff9b91;stroke-width:2}
      .good{fill:#eff7ff;stroke:#82b6ff;stroke-width:2}
      .label{font-family:"Microsoft YaHei","Noto Sans SC",sans-serif;font-size:28px;font-weight:800;fill:#111827}
      .text{font-family:"Microsoft YaHei","Noto Sans SC",sans-serif;font-size:22px;font-weight:650;fill:#374151}
      .small{font-family:"Microsoft YaHei","Noto Sans SC",sans-serif;font-size:18px;font-weight:600;fill:#6b7280}
      .arrow{stroke:#2f6df6;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2f6df6"/>
    </marker>
  </defs>
  <rect class="bg" width="1400" height="760"/>
  <text class="title" x="70" y="86">坑一：把“图片”误当成“视频”</text>
  <text class="sub" x="70" y="126">静态图只是画面素材，真正的视频还需要口播、字幕时间轴和分镜数据。</text>

  <rect class="bad" x="90" y="200" width="500" height="360" rx="28"/>
  <text class="label" x="140" y="260">初版理解</text>
  <text class="text" x="140" y="320">终稿 -> 多张图片 -> 拼成视频</text>
  <text class="small" x="140" y="382">问题：没有时间轴，没有口播节奏，</text>
  <text class="small" x="140" y="416">图片上的文字越多，视频越难读。</text>
  <text class="small" x="140" y="470">结果：像幻灯片，不像新闻解读视频。</text>

  <path class="arrow" d="M610 380 H780"/>

  <rect class="good" x="810" y="200" width="500" height="360" rx="28"/>
  <text class="label" x="860" y="260">后来的拆法</text>
  <text class="text" x="860" y="320">图片：承载画面重点</text>
  <text class="text" x="860" y="360">口播：承载完整叙述</text>
  <text class="text" x="860" y="400">SRT：承载时间同步</text>
  <text class="text" x="860" y="440">分镜：承载信息组织</text>
  <text class="small" x="860" y="500">每一层只做自己擅长的事。</text>
</svg>
