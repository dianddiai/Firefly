<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <style>
      .bg{fill:#f6f7f9}
      .title{font-family:"Microsoft YaHei","Noto Sans SC",sans-serif;font-size:44px;font-weight:800;fill:#111827}
      .sub{font-family:"Microsoft YaHei","Noto Sans SC",sans-serif;font-size:22px;font-weight:600;fill:#5b6472}
      .row{fill:#fff;stroke:#d9dee7;stroke-width:2}
      .tag{fill:#111827}
      .tagText{font-family:"Microsoft YaHei","Noto Sans SC",sans-serif;font-size:18px;font-weight:800;fill:#fff}
      .text{font-family:"Microsoft YaHei","Noto Sans SC",sans-serif;font-size:22px;font-weight:700;fill:#111827}
      .small{font-family:"Microsoft YaHei","Noto Sans SC",sans-serif;font-size:18px;font-weight:600;fill:#657083}
      .solution{fill:#2f6df6}
    </style>
  </defs>
  <rect class="bg" width="1400" height="760"/>
  <text class="title" x="70" y="86">这条工作流真正的难点</text>
  <text class="sub" x="70" y="126">不是“能不能生成视频”，而是每个环节各司其职，并且能稳定复用。</text>

  <rect class="row" x="80" y="180" width="1240" height="78" rx="18"/>
  <rect class="tag" x="110" y="203" width="100" height="34" rx="17"/>
  <text class="tagText" x="135" y="226">坑 01</text>
  <text class="text" x="240" y="228">把图片当视频</text>
  <text class="small" x="520" y="228">解决：拆成图片、口播、SRT、分镜四层</text>

  <rect class="row" x="80" y="280" width="1240" height="78" rx="18"/>
  <rect class="tag" x="110" y="303" width="100" height="34" rx="17"/>
  <text class="tagText" x="135" y="326">坑 02</text>
  <text class="text" x="240" y="328">字幕写死在图片</text>
  <text class="small" x="520" y="328">解决：图片留安全区，字幕由 SRT 驱动</text>

  <rect class="row" x="80" y="380" width="1240" height="78" rx="18"/>
  <rect class="tag" x="110" y="403" width="100" height="34" rx="17"/>
  <text class="tagText" x="135" y="426">坑 03</text>
  <text class="text" x="240" y="428">动效越多越廉价</text>
  <text class="small" x="520" y="428">解决：第一版回到稳定翻页和清晰字幕</text>

  <rect class="row" x="80" y="480" width="1240" height="78" rx="18"/>
  <rect class="tag" x="110" y="503" width="100" height="34" rx="17"/>
  <text class="tagText" x="135" y="526">坑 04</text>
  <text class="text" x="240" y="528">代码排版不好看</text>
  <text class="small" x="520" y="528">解决：用 HTML/CSS 做模板，再浏览器渲染 PNG</text>

  <rect class="row" x="80" y="580" width="1240" height="78" rx="18"/>
  <rect class="tag" x="110" y="603" width="100" height="34" rx="17"/>
  <text class="tagText" x="135" y="626">坑 05</text>
  <text class="text" x="240" y="628">分镜按字数硬切</text>
  <text class="small" x="520" y="628">解决：按语义结构切页，再用口播时长校正</text>
</svg>
